hostname rtr-01
!
username admin privilege 15 role network-admin secret 0 admin
!
interface Ethernet1
   description to edge-fw-01 ethernet1/2
   no switchport
   ip address 192.168.0.1/30
!
interface Ethernet2
   description to dc-fw-01 ethernet1/1
   no switchport
   ip address 192.168.0.5/30
!
ip routing
!
ip route 10.10.10.0/24 192.168.0.2
ip route 10.20.20.0/24 192.168.0.6
ip route 0.0.0.0/0 10.77.77.1
!
!
management ssh
   authentication mode password
   no shutdown
!
