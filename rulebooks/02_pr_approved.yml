---
- name: GitHub PR approved
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002

  rules:
    - name: Pull request approved by a reviewer
      condition: >-
        event.payload.action == "submitted" and
        event.payload.review.state == "approved"
      action:
        run_job_template:
          name: "AI FW - Create change request"
          organization: "Default"
          job_args:
            extra_vars:
              change_branch: "{{ event.payload.pull_request.head.ref }}"
              pr_number: "{{ event.payload.pull_request.number }}"
              pr_url: "{{ event.payload.pull_request.html_url }}"
